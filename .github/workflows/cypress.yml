name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Verify bundled themes are up to date
        run: |
          npm run build:themes
          git diff --exit-code src/themes/index.js \
            || (echo "src/themes/index.js is stale — run 'npm run build:themes' and commit." && exit 1)

  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cypress smoke test
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # The other specs intentionally fail/skip to demo theme colours in
          # `cypress open`; only test-pass is a real green smoke test that
          # confirms the plugin loads under the current Cypress version.
          spec: cypress/e2e/test-pass.cy.js
